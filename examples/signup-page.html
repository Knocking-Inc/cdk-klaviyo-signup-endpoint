<!DOCTYPE html>
<!-- 
    Klaviyo Signup Page Example
    
    This example demonstrates how to integrate with the Klaviyo signup API endpoint.
    
    Configuration:
    - API_ENDPOINT: Your deployed API Gateway endpoint
    - API_KEY: Your API key for authentication
    - DOMAIN: The domain for this signup (must be in ALLOWED_DOMAINS)
    
    IMPORTANT: LOCAL TESTING REQUIREMENTS
    =====================================
    This page will only work locally if 'localhost' is added to the ALLOWED_DOMAINS
    environment variable in your CDK stack. This is NOT recommended for production!
    
    For local testing:
    1. Ensure 'localhost' is in ALLOWED_DOMAINS in your CDK stack
    2. Use 'localhost' as the DOMAIN constant below
    3. Access via http://localhost:8000/signup-page.html
    
    For production:
    1. Remove 'localhost' from ALLOWED_DOMAINS in your CDK stack
    2. Change DOMAIN to your actual domain (e.g., 'moviexclusives.com')
    3. Deploy the updated stack
    
    SECURITY NOTE: The 'localhost' domain should NEVER be allowed in production
    environments as it could allow unauthorized access to your signup endpoint.
    
    Current configuration:
    - Domain: localhost (for local testing only)
    - API Key: NvhGCoJLH38y2bxdIqdbO4H7btCvDgIa6tmGgNB4
    - Endpoint: https://ajocgvomn1.execute-api.us-east-1.amazonaws.com/prod/signup
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Signup</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        p {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 1rem;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .sequence-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stay Updated</h1>
        <p>Subscribe to our newsletter and be the first to know about new updates and features!</p>
        
        <form id="signupForm">
            <div class="form-group">
                <input 
                    type="email" 
                    id="emailInput" 
                    placeholder="Enter your email address" 
                    required
                >
            </div>
            <button type="submit" id="submitBtn">Subscribe</button>
        </form>
        
        <div id="message" class="message" style="display: none;"></div>
    </div>

    <script>
        // Configuration - Update these values with your actual API details
        const API_ENDPOINT = 'https://ajocgvomn1.execute-api.us-east-1.amazonaws.com/prod/signup';
        const API_KEY = 'NvhGCoJLH38y2bxdIqdbO4H7btCvDgIa6tmGgNB4';
        const DOMAIN = 'localhost'; // Use 'localhost' for local testing, 'moviexclusives.com' for production
        
        // SECURITY NOTE: 'localhost' is only allowed for development testing.
        // In production, use your actual domain (e.g., 'moviexclusives.com').
        // The API key provides authentication, but domain validation adds an extra security layer.

        const form = document.getElementById('signupForm');
        const emailInput = document.getElementById('emailInput');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, isSuccess = false) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${isSuccess ? 'success' : 'error'}`;
            messageDiv.style.display = 'block';
        }

        function hideMessage() {
            messageDiv.style.display = 'none';
        }

        async function signupEmail(email) {
            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({ 
                        email: email,
                        domain: DOMAIN
                    })
                });

                const result = await response.json();
                
                if (response.ok) {
                    return result;
                } else {
                    throw new Error(result.message || 'Signup failed');
                }
            } catch (error) {
                console.error('Signup error:', error);
                throw error;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            
            if (!email) {
                showMessage('Please enter a valid email address');
                return;
            }

            // Disable form during submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Subscribing...';
            hideMessage();

            try {
                const result = await signupEmail(email);
                
                // Show success message with sequence number
                showMessage(
                    `Welcome! You are subscriber #${result.sequenceNumber}.`,
                    true
                );
                
                // Clear form
                form.reset();
                
            } catch (error) {
                showMessage(error.message || 'An error occurred. Please try again.');
            } finally {
                // Re-enable form
                submitBtn.disabled = false;
                submitBtn.textContent = 'Subscribe';
            }
        });

        // Clear message when user starts typing
        emailInput.addEventListener('input', hideMessage);
    </script>
</body>
</html>
